<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chefia ADMUFT | Greve x Boleto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --azul-chefia: #004a99; }
        .bg-chefia { background-color: var(--azul-chefia); }
        .text-chefia { color: var(--azul-chefia); }
        .banner-img { width: 100%; max-height: 300px; object-fit: cover; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <div class="w-full shadow-lg bg-blue-500 overflow-hidden text-center border-b-4 border-blue-900">
        <img src="banner.jpg" alt="Chefia ADMUFT" class="banner-img inline-block">
    </div>

    <div class="container mx-auto px-4 py-6">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 text-center md:text-left">
            <div>
                <h1 class="text-3xl font-black text-chefia uppercase italic tracking-tighter">Rateio Greve x Boleto</h1>
                <p class="text-slate-500 font-bold text-xs uppercase tracking-widest">Administração UFT - Palmas/TO</p>
            </div>
            
            <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center gap-3 border border-slate-200">
                <span class="text-[10px] font-black uppercase text-slate-400">Filtrar:</span>
                <select id="filtroModalidade" onchange="renderizar()" class="bg-slate-50 border-none text-sm font-bold text-chefia focus:ring-0 outline-none cursor-pointer">
                    <option value="TODOS">Todas as Modalidades</option>
                    <option value="Futsal">Futsal Masculino</option>
                    <option value="Vôlei">Vôlei de Quadra</option>
                    <option value="Tênis de Mesa">Tênis de Mesa</option>
                    <option value="FIFA Fem">FIFA Feminino</option>
                    <option value="Xadrez">Xadrez</option>
                    <option value="LoL">LoL</option>
                    <option value="Poker">Poker</option>
                    <option value="Truco">Truco</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Lucro da Atlética (%)</label>
                    <input type="number" id="lucroPercent" value="10" oninput="processarDados()" class="w-full p-3 bg-slate-50 rounded-xl border-2 border-slate-100 font-black text-chefia outline-none focus:border-blue-500 transition-all">
                </div>

                <div class="bg-chefia p-6 rounded-3xl text-white shadow-xl relative overflow-hidden">
                    <p class="text-[10px] font-bold uppercase opacity-60 tracking-widest">Saldo Total</p>
                    <div class="text-3xl font-black" id="totalGeral">R$ 0,00</div>
                    
                    <div class="mt-4 pt-4 border-t border-white/20 space-y-3">
                        <div>
                            <p class="text-[9px] opacity-60 uppercase font-bold">Média por Atleta</p>
                            <p class="text-lg font-black" id="ticketMedio">R$ 0,00</p>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-center">
                            <div class="bg-blue-900/40 p-2 rounded-xl border border-white/10">
                                <p class="text-[8px] opacity-70 uppercase font-bold italic">1 Mod.</p>
                                <p class="text-sm font-black" id="ticket1Mod">R$ 0,00</p>
                            </div>
                            <div class="bg-blue-900/40 p-2 rounded-xl border border-white/10">
                                <p class="text-[8px] opacity-70 uppercase font-bold italic">2 Mods.</p>
                                <p class="text-sm font-black" id="ticket2Mod">R$ 0,00</p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 pt-4 border-t border-white/20 flex justify-between items-center text-[10px] font-bold">
                        <span>LUCRO ATLÉTICA:</span>
                        <span id="lucroLiquido" class="bg-white text-chefia px-2 py-1 rounded">R$ 0,00</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left border-collapse text-sm">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-5 text-[10px] font-black text-slate-400 uppercase">Atleta</th>
                            <th class="p-5 text-[10px] font-black text-slate-400 uppercase text-center">Inscrições</th>
                            <th class="p-5 text-[10px] font-black text-slate-400 uppercase text-right">Total a Pagar</th>
                            <th class="p-5 text-[10px] font-black text-slate-400 uppercase text-center">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo" class="divide-y divide-slate-50 font-medium text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let dadosAtletas = new Map();

        // Dados das listas e custos base rateados conforme definições da Atlética
        const LISTAS = {
            "Futsal": { nomes: ["manguary", "arthur", "yohan", "joão vitor", "felipe", "vitor t", "lucas", "antaniel (goleiro)", "gabriel gomes", "victor hugo", "jonadabe", "walysson"], custo: 66.67 },
            "Vôlei": { nomes: ["josé gabriel", "davi", "bruno", "washington", "joão pedro", "yohan", "manguary", "daniel aquiles", "judson", "trevisan", "kayque", "icaro"], custo: 66.67 },
            "Tênis de Mesa": { nomes: ["harife"], custo: 80.00 },
            "FIFA Fem": { nomes: ["bianca"], custo: 80.00 },
            "Xadrez": { nomes: ["izaias"], custo: 80.00 },
            "LoL": { nomes: ["eliã", "andreu", "joão lucas"], custo: 160.00 },
            "Poker": { nomes: ["matheus"], custo: 80.00 },
            "Truco": { nomes: ["ana paula", "vitor hugo"], custo: 80.00 }
        };

        function processarDados() {
            dadosAtletas.clear();
            const margem = 1 + (parseFloat(document.getElementById('lucroPercent').value) / 100);

            for (const [modalidade, info] of Object.entries(LISTAS)) {
                info.nomes.forEach(nome => {
                    // Formatação automática para Capitalize (Primeira Letra Maiúscula)
                    const nomeFormatado = nome.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ');
                    if (!dadosAtletas.has(nomeFormatado)) {
                        dadosAtletas.set(nomeFormatado, { mods: [], custoBase: 0, valorFinal: 0 });
                    }
                    let data = dadosAtletas.get(nomeFormatado);
                    data.mods.push(modalidade);
                    data.custoBase += info.custo;
                    data.valorFinal += info.custo * margem;
                });
            }
            renderizar();
        }

        function renderizar() {
            const corpo = document.getElementById('tabelaCorpo');
            const filtro = document.getElementById('filtroModalidade').value;
            corpo.innerHTML = '';
            
            let totalArrecadado = 0;
            let totalCustoBase = 0;
            let soma1Mod = 0, qtd1Mod = 0;
            let soma2Mod = 0, qtd2Mod = 0;
            let atletasFiltrados = 0;

            Array.from(dadosAtletas.entries()).sort().forEach(([nome, info]) => {
                const nMods = info.mods.length;
                if (nMods === 1) { soma1Mod += info.valorFinal; qtd1Mod++; }
                if (nMods === 2) { soma2Mod += info.valorFinal; qtd2Mod++; }

                if (filtro !== "TODOS" && !info.mods.includes(filtro)) return;

                totalArrecadado += info.valorFinal;
                totalCustoBase += info.custoBase;
                atletasFiltrados++;

                corpo.innerHTML += `
                    <tr class="hover:bg-blue-50/50 transition-all">
                        <td class="p-5 font-black text-slate-800">${nome}</td>
                        <td class="p-5 text-center">
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${nMods} modalidade(s)</span>
                                <div class="flex flex-wrap gap-1 justify-center">
                                    ${info.mods.map(m => `<span class="bg-blue-100 text-blue-700 text-[8px] px-2 py-0.5 rounded-full font-black uppercase border border-blue-200">${m}</span>`).join('')}
                                </div>
                            </div>
                        </td>
                        <td class="p-5 text-right font-black text-chefia text-lg">R$ ${info.valorFinal.toFixed(2)}</td>
                        <td class="p-5 text-center">
                            <button onclick="copiarZap('${nome}', ${info.valorFinal}, ${nMods})" class="bg-emerald-500 text-white p-2.5 rounded-xl hover:scale-110 active:scale-95 transition-all shadow-md">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalGeral').innerText = `R$ ${totalArrecadado.toFixed(2)}`;
            document.getElementById('ticketMedio').innerText = `R$ ${atletasFiltrados > 0 ? (totalArrecadado / atletasFiltrados).toFixed(2) : '0,00'}`;
            document.getElementById('ticket1Mod').innerText = `R$ ${qtd1Mod > 0 ? (soma1Mod / qtd1Mod).toFixed(2) : '0,00'}`;
            document.getElementById('ticket2Mod').innerText = `R$ ${qtd2Mod > 0 ? (soma2Mod / qtd2Mod).toFixed(2) : '0,00'}`;
            document.getElementById('lucroLiquido').innerText = `R$ ${(totalArrecadado - totalCustoBase).toFixed(2)}`;
        }

        function copiarZap(nome, valor, n) {
            const msg = `Salve, ${nome}! 🦈\n\nRateio *Chefia ADMUFT* (Greve x Boleto):\n📍 Inscrito em: *${n} modalidade(s)*\n💰 Valor Total: *R$ ${valor.toFixed(2)}*\n\nMande o comprovante pro PIX da Atlética para confirmar sua inscrição!`;
            navigator.clipboard.writeText(msg);
            alert("Texto copiado para o WhatsApp de " + nome);
        }

        processarDados();
    </script>
</body>
</html>
